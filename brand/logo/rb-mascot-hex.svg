  <polygon points="256,80 400,160 400,352 256,432 112,352 112,160" fill="none" stroke="url(#em)" stroke-width="6" stroke-opacity="0.6"/>
  <polygon points="256,150 340,198 340,314 256,362 172,314 172,198" fill="#1C1C1E" stroke="#27272A" stroke-width="3"/>
  <!-- Nucleo RB -->
  <text x="256" y="300" font-family="'Space Grotesk', sans-serif" font-size="92" font-weight="700" fill="url(#em)" text-anchor="middle" letter-spacing="-4">RB</text>
  <!-- Circuit nodes -->
  <circle cx="256" cy="80" r="10" fill="#22C55E"/>
  <circle cx="400" cy="160" r="8" fill="#22C55E"/>
  <circle cx="400" cy="352" r="8" fill="#22C55E"/>
  <circle cx="256" cy="432" r="10" fill="#22C55E"/>
  <circle cx="112" cy="352" r="8" fill="#22C55E"/>
  <circle cx="112" cy="160" r="8" fill="#22C55E"/>
