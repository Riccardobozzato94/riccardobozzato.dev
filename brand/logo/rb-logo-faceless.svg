<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0A0B"/>
      <stop offset="1" stop-color="#121214"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#16A34A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22C55E" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="220" fill="url(#glow)"/>
  <!-- Terminal window frame (faceless tech mark) -->
  <rect x="96" y="140" width="320" height="232" rx="20" fill="#1C1C1E" stroke="#27272A" stroke-width="2"/>
  <rect x="96" y="140" width="320" height="48" rx="20" fill="#212124"/>
  <circle cx="124" cy="164" r="7" fill="#EF4444"/>
  <circle cx="148" cy="164" r="7" fill="#EAB308"/>
  <circle cx="172" cy="164" r="7" fill="#22C55E"/>
  <!-- Faceless monogram RB as abstract geometric prompt -->
  <text x="256" y="300" font-family="'Space Grotesk', sans-serif" font-size="120" font-weight="700" fill="url(#emerald)" text-anchor="middle" letter-spacing="-6">RB</text>
  <!-- Cursor blink line -->
  <rect x="200" y="332" width="112" height="6" rx="3" fill="#22C55E">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
