<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="600" cy="300" rx="400" ry="300" fill="url(#glow)"/>

  <!-- Navbar -->
  <rect x="0" y="0" width="1200" height="64" fill="#0a0a0a" opacity="0.9"/>
  <rect x="0" y="64" width="1200" height="1" fill="#222"/>

  <!-- Logo hexagon -->
  <polygon points="40,32 50,26 60,32 60,44 50,50 40,44" fill="none" stroke="#16a34a" stroke-width="1.5"/>
  <circle cx="50" cy="38" r="2" fill="#16a34a"/>

  <!-- Logo text -->
  <text x="72" y="44" fill="#fff" font-family="system-ui" font-size="18" font-weight="600">riccardobozzato.dev</text>

  <!-- Nav links -->
  <text x="850" y="43" fill="#888" font-family="system-ui" font-size="13">Home</text>
  <text x="900" y="43" fill="#16a34a" font-family="system-ui" font-size="13" font-weight="600">Projects</text>
  <text x="968" y="43" fill="#888" font-family="system-ui" font-size="13">Blog</text>
  <text x="1012" y="43" fill="#888" font-family="system-ui" font-size="13">About</text>
  <rect x="1060" y="30" width="80" height="28" rx="14" fill="#16a34a" opacity="0.9"/>
  <text x="1084" y="49" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">Contact</text>

  <!-- Hero section -->
  <text x="600" y="160" fill="#888" font-family="system-ui" font-size="13" text-anchor="middle">Next.js 16 · Tailwind v4 · shadcn/ui</text>
  <text x="600" y="210" fill="#fff" font-family="system-ui" font-size="52" font-weight="700" text-anchor="middle">Ship Your SaaS in Days</text>
  <text x="600" y="250" fill="#16a34a" font-family="system-ui" font-size="22" font-weight="600" text-anchor="middle">Production-ready boilerplate</text>
  <text x="600" y="285" fill="#888" font-family="system-ui" font-size="16" text-anchor="middle">Auth · Database · Email · Billing · i18n · UI — all included.</text>

  <!-- CTA Buttons -->
  <rect x="500" y="310" width="120" height="40" rx="10" fill="url(#accent)" filter="url(#shadow)"/>
  <text x="560" y="335" fill="#fff" font-family="system-ui" font-size="14" font-weight="600" text-anchor="middle">Get Started</text>
  <rect x="640" y="310" width="120" height="40" rx="10" fill="none" stroke="#333"/>
  <text x="700" y="335" fill="#ccc" font-family="system-ui" font-size="14" text-anchor="middle">Learn More</text>

  <!-- Features grid -->
  <rect x="80" y="420" width="320" height="140" rx="12" fill="#111" stroke="#222"/>
  <rect x="100" y="440" width="40" height="40" rx="8" fill="#16a34a" opacity="0.15"/>
  <text x="112" y="465" fill="#16a34a" font-family="system-ui" font-size="18" font-weight="700">A</text>
  <text x="155" y="460" fill="#fff" font-family="system-ui" font-size="16" font-weight="600">Auth</text>
  <text x="100" y="490" fill="#666" font-family="system-ui" font-size="13">Magic links, OAuth, 2FA,</text>
  <text x="100" y="508" fill="#666" font-family="system-ui" font-size="13">session management</text>

  <rect x="440" y="420" width="320" height="140" rx="12" fill="#111" stroke="#222"/>
  <rect x="460" y="440" width="40" height="40" rx="8" fill="#16a34a" opacity="0.15"/>
  <text x="476" y="465" fill="#16a34a" font-family="system-ui" font-size="16" font-weight="700">DB</text>
  <text x="515" y="460" fill="#fff" font-family="system-ui" font-size="16" font-weight="600">Database</text>
  <text x="460" y="490" fill="#666" font-family="system-ui" font-size="13">Drizzle ORM, PostgreSQL,</text>
  <text x="460" y="508" fill="#666" font-family="system-ui" font-size="13">migrations & seeds</text>

  <rect x="800" y="420" width="320" height="140" rx="12" fill="#111" stroke="#222"/>
  <rect x="820" y="440" width="40" height="40" rx="8" fill="#16a34a" opacity="0.15"/>
  <text x="834" y="465" fill="#16a34a" font-family="system-ui" font-size="16" font-weight="700">@</text>
  <text x="875" y="460" fill="#fff" font-family="system-ui" font-size="16" font-weight="600">Email</text>
  <text x="820" y="490" fill="#666" font-family="system-ui" font-size="13">Resend integration, React</text>
  <text x="820" y="508" fill="#666" font-family="system-ui" font-size="13">Email templates</text>

  <rect x="80" y="590" width="320" height="140" rx="12" fill="#111" stroke="#222"/>
  <rect x="100" y="610" width="40" height="40" rx="8" fill="#16a34a" opacity="0.15"/>
  <text x="112" y="635" fill="#16a34a" font-family="system-ui" font-size="16" font-weight="700">🌐</text>
  <text x="155" y="630" fill="#fff" font-family="system-ui" font-size="16" font-weight="600">i18n</text>
  <text x="100" y="660" fill="#666" font-family="system-ui" font-size="13">English/Italian, next-intl,</text>
  <text x="100" y="678" fill="#666" font-family="system-ui" font-size="13">day-1 internationalization</text>

  <rect x="440" y="590" width="320" height="140" rx="12" fill="#111" stroke="#222"/>
  <rect x="460" y="610" width="40" height="40" rx="8" fill="#16a34a" opacity="0.15"/>
  <text x="476" y="635" fill="#16a34a" font-family="system-ui" font-size="16" font-weight="700">$</text>
  <text x="515" y="630" fill="#fff" font-family="system-ui" font-size="16" font-weight="600">Billing</text>
  <text x="460" y="660" fill="#666" font-family="system-ui" font-size="13">Stripe, webhooks, checkout,</text>
  <text x="460" y="678" fill="#666" font-family="system-ui" font-size="13">subscription management</text>

  <rect x="800" y="590" width="320" height="140" rx="12" fill="#111" stroke="#222"/>
  <rect x="820" y="610" width="40" height="40" rx="8" fill="#16a34a" opacity="0.15"/>
  <text x="834" y="635" fill="#16a34a" font-family="system-ui" font-size="16" font-weight="700">◆</text>
  <text x="875" y="630" fill="#fff" font-family="system-ui" font-size="16" font-weight="600">UI</text>
  <text x="820" y="660" fill="#666" font-family="system-ui" font-size="13">shadcn/ui, dark theme,</text>
  <text x="820" y="678" fill="#666" font-family="system-ui" font-size="13">responsive components</text>
</svg>