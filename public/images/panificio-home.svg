<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#292524"/>
      <stop offset="100%" stop-color="#1c1917"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>
  <!-- Warm ambient glow -->
  <ellipse cx="600" cy="250" rx="450" ry="300" fill="url(#glow)"/>
  <!-- Navbar -->
  <rect x="0" y="0" width="1200" height="64" fill="#1c1917" opacity="0.95"/>
  <rect x="0" y="64" width="1200" height="1" fill="#444" opacity="0.3"/>
  <text x="30" y="42" fill="#fbbf24" font-family="system-ui" font-size="18" font-weight="700">Panificio Da Sergio</text>
  <text x="220" y="42" fill="#a8a29e" font-family="system-ui" font-size="13">Home</text>
  <text x="275" y="42" fill="#a8a29e" font-family="system-ui" font-size="13">Prodotti</text>
  <text x="345" y="42" fill="#a8a29e" font-family="system-ui" font-size="13">Chi Siamo</text>
  <text x="420" y="42" fill="#a8a29e" font-family="system-ui" font-size="13">Contatti</text>
  <rect x="1060" y="28" width="110" height="30" rx="15" fill="url(#warm)"/>
  <text x="1115" y="48" fill="#fff" font-family="system-ui" font-size="12" font-weight="600" text-anchor="middle">Ordina Ora</text>
  <!-- Hero section -->
  <text x="600" y="170" fill="#fbbf24" font-family="system-ui" font-size="14" text-anchor="middle" letter-spacing="2">DA QUATTRO GENERAZIONI</text>
  <text x="600" y="220" fill="#fff" font-family="system-ui" font-size="52" font-weight="700" text-anchor="middle">Il Forno di Famiglia</text>
  <text x="600" y="260" fill="#d6d3d1" font-family="system-ui" font-size="18" text-anchor="middle">Pane artigianale, dolci tradizionali e specialit&agrave; locali</text>
  <text x="600" y="290" fill="#a8a29e" font-family="system-ui" font-size="14" text-anchor="middle">dal 1958 — via Roma 42, Brisighella</text>
  <!-- CTA Buttons -->
  <rect x="450" y="325" width="140" height="44" rx="10" fill="url(#warm)"/>
  <text x="520" y="352" fill="#fff" font-family="system-ui" font-size="14" font-weight="600" text-anchor="middle">Scopri i Prodotti</text>
  <rect x="610" y="325" width="140" height="44" rx="10" fill="none" stroke="#57534e"/>
  <text x="680" y="352" fill="#d6d3d1" font-family="system-ui" font-size="14" text-anchor="middle">Contattaci</text>
  <!-- Product cards -->
  <text x="600" y="420" fill="#fff" font-family="system-ui" font-size="24" font-weight="700" text-anchor="middle">I Nostri Prodotti</text>
  <!-- Card 1 - Pane -->
  <rect x="80" y="455" width="320" height="200" rx="14" fill="url(#cardBg)" stroke="#444" stroke-opacity="0.3"/>
  <rect x="100" y="475" width="280" height="130" rx="8" fill="#d97706" opacity="0.08"/>
  <text x="240" y="505" fill="#fbbf24" font-family="system-ui" font-size="28">&#127838;</text>
  <text x="100" y="540" fill="#fff" font-family="system-ui" font-size="18" font-weight="600">Pane Artigianale</text>
  <text x="100" y="565" fill="#a8a29e" font-family="system-ui" font-size="12">Focaccia, ciabatta, integrale,</text>
  <text x="100" y="583" fill="#a8a29e" font-family="system-ui" font-size="12">segale e specialit&agrave; locali</text>
  <text x="100" y="615" fill="#fbbf24" font-family="system-ui" font-size="14" font-weight="600">Da &euro;2,50</text>
  <rect x="300" y="625" width="80" height="28" rx="8" fill="url(#warm)" opacity="0.9"/>
  <text x="340" y="644" fill="#fff" font-family="system-ui" font-size="11" font-weight="600" text-anchor="middle">Ordina</text>
  <!-- Card 2 - Dolci -->
  <rect x="440" y="455" width="320" height="200" rx="14" fill="url(#cardBg)" stroke="#444" stroke-opacity="0.3"/>
  <rect x="460" y="475" width="280" height="130" rx="8" fill="#d97706" opacity="0.08"/>
  <text x="600" y="505" fill="#fbbf24" font-family="system-ui" font-size="28">&#127856;</text>
  <text x="460" y="540" fill="#fff" font-family="system-ui" font-size="18" font-weight="600">Dolci Tradizionali</text>
  <text x="460" y="565" fill="#a8a29e" font-family="system-ui" font-size="12">Crostate, biscotti, ciambelle,</text>
  <text x="460" y="583" fill="#a8a29e" font-family="system-ui" font-size="12">torte della nonna e molto altro</text>
  <text x="460" y="615" fill="#fbbf24" font-family="system-ui" font-size="14" font-weight="600">Da &euro;3,00</text>
  <rect x="680" y="625" width="80" height="28" rx="8" fill="url(#warm)" opacity="0.9"/>
  <text x="720" y="644" fill="#fff" font-family="system-ui" font-size="11" font-weight="600" text-anchor="middle">Ordina</text>
  <!-- Card 3 - Specialita -->
  <rect x="800" y="455" width="320" height="200" rx="14" fill="url(#cardBg)" stroke="#444" stroke-opacity="0.3"/>
  <rect x="820" y="475" width="280" height="130" rx="8" fill="#d97706" opacity="0.08"/>
  <text x="960" y="505" fill="#fbbf24" font-family="system-ui" font-size="28">&#127844;</text>
  <text x="820" y="540" fill="#fff" font-family="system-ui" font-size="18" font-weight="600">Specialit&agrave; Locali</text>
  <text x="820" y="565" fill="#a8a29e" font-family="system-ui" font-size="12">Piadina, gnocco fritto,</text>
  <text x="820" y="583" fill="#a8a29e" font-family="system-ui" font-size="12">squacquerone e salumi</text>
  <text x="820" y="615" fill="#fbbf24" font-family="system-ui" font-size="14" font-weight="600">Da &euro;4,00</text>
  <rect x="1020" y="625" width="80" height="28" rx="8" fill="url(#warm)" opacity="0.9"/>
  <text x="1060" y="644" fill="#fff" font-family="system-ui" font-size="11" font-weight="600" text-anchor="middle">Ordina</text>
  <!-- Footer section -->
  <rect x="0" y="700" width="1200" height="100" fill="#0c0a09"/>
  <rect x="0" y="700" width="1200" height="1" fill="#444" opacity="0.3"/>
  <text x="600" y="735" fill="#a8a29e" font-family="system-ui" font-size="12" text-anchor="middle">Panificio Da Sergio &mdash; Via Roma 42, Brisighella (RA)</text>
  <text x="600" y="758" fill="#78716c" font-family="system-ui" font-size="11" text-anchor="middle">Aperti dal luned&igrave; al sabato, 7:00 - 13:00 / 16:00 - 19:30</text>
  <text x="600" y="780" fill="#57534e" font-family="system-ui" font-size="10" text-anchor="middle">&copy; 2026 Panificio Da Sergio. Tutti i diritti riservati.</text>
</svg>