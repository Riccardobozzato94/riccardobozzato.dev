<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" rx="0" fill="#0A0A0A"/>
  <!-- Gradient blobs -->
  <circle cx="300" cy="300" r="300" fill="url(#blob1)" opacity="0.15"/>
  <circle cx="950" cy="200" r="250" fill="url(#blob2)" opacity="0.1"/>
  <circle cx="600" cy="500" r="200" fill="url(#blob3)" opacity="0.08"/>
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    <radialGradient id="blob1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="blob2">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="blob3">
      <stop offset="0%" stop-color="#A5B4FC"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Hexagon logo -->
  <g transform="translate(100, 315)">
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15" fill="none" stroke="#6366F1" stroke-width="2.5"/>
    <polygon points="0,-20 17.3,-10 17.3,10 0,20 -17.3,10 -17.3,-10" fill="#6366F1" opacity="0.3"/>
  </g>
  <!-- Text -->
  <text x="146" y="333" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="700" fill="#F5F5F5" letter-spacing="-0.02">Riccardo</text>
  <text x="146" y="355" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="300" fill="#A1A1AA" letter-spacing="-0.01">Operations &amp; Delivery Consultant | PMP®</text>
  <!-- Tagline -->
  <text x="100" y="430" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#818CF8" font-weight="500" letter-spacing="-0.01">Complex Problems. Turnkey Solutions.</text>
  <!-- Bottom bar -->
  <rect x="100" y="500" width="1000" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="100" y="540" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#52525B" letter-spacing="0.05">Serverless · AI Agents · Automation · Integration</text>
  <text x="100" y="565" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#3F3F46">riccardobozzato.dev</text>
  <!-- Right accent shape -->
  <rect x="1000" y="100" width="2" height="430" rx="1" fill="#6366F1" opacity="0.4"/>
  <text x="1025" y="540" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#52525B">€500K+ delivered</text>
</svg>
