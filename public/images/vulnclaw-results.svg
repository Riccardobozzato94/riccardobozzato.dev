<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)" rx="12"/>
  <rect x="0" y="0" width="800" height="40" fill="url(#header)" rx="12"/>
  <rect x="0" y="24" width="800" height="16" fill="url(#header)"/>
  <circle cx="20" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="42" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="20" r="6" fill="#27c93f"/>
  <text x="400" y="25" fill="#666" font-family="monospace" font-size="12" text-anchor="middle">vulnclaw — report (results)</text>
  <text x="20" y="70" fill="#16a34a" font-family="monospace" font-size="13">$ vulnclaw report --target example.com</text>
  <text x="20" y="95" fill="#888" font-family="monospace" font-size="12">Generating penetration test report...</text>
  <text x="20" y="120" fill="#fff" font-family="monospace" font-size="14" font-weight="bold">═══════════════════════════════════════</text>
  <text x="20" y="145" fill="#fff" font-family="monospace" font-size="14" font-weight="bold">  VULNCLAW SECURITY ASSESSMENT REPORT</text>
  <text x="20" y="165" fill="#fff" font-family="monospace" font-size="14" font-weight="bold">═══════════════════════════════════════</text>
  <text x="20" y="195" fill="#888" font-family="monospace" font-size="12">Target:       example.com</text>
  <text x="20" y="215" fill="#888" font-family="monospace" font-size="12">Date:         2026-07-15</text>
  <text x="20" y="235" fill="#888" font-family="monospace" font-size="12">Duration:     42m 18s</text>
  <text x="20" y="255" fill="#888" font-family="monospace" font-size="12">Severity:     High</text>
  <text x="20" y="285" fill="#fff" font-family="monospace" font-size="12" font-weight="bold">Findings:</text>
  <rect x="20" y="300" width="760" height="1" fill="#333"/>
  <text x="20" y="325" fill="#ef4444" font-family="monospace" font-size="12">CRITICAL   CVE-2024-XXXX   Path Traversal in /api/download</text>
  <text x="40" y="345" fill="#888" font-family="monospace" font-size="11">File: /api/download?file=../../etc/passwd</text>
  <text x="40" y="360" fill="#888" font-family="monospace" font-size="11">Remediation: Sanitize file path input, use allowlist</text>
  <rect x="20" y="375" width="760" height="1" fill="#222"/>
  <text x="20" y="400" fill="#ef4444" font-family="monospace" font-size="12">HIGH       CVE-2024-YYYY   Default Admin Credentials</text>
  <text x="40" y="420" fill="#888" font-family="monospace" font-size="11">Endpoint: /admin (admin:admin)</text>
  <text x="40" y="435" fill="#888" font-family="monospace" font-size="11">Remediation: Force password change on first login</text>
  <rect x="20" y="450" width="760" height="1" fill="#222"/>
  <text x="20" y="475" fill="#eab308" font-family="monospace" font-size="12">MEDIUM     CVE-2023-YYYY   Missing HSTS Header</text>
  <text x="40" y="495" fill="#888" font-family="monospace" font-size="11">Endpoint: All HTTP responses</text>
  <text x="40" y="510" fill="#888" font-family="monospace" font-size="11">Remediation: Add Strict-Transport-Security header</text>
  <rect x="20" y="525" width="760" height="1" fill="#222"/>
  <text x="20" y="550" fill="#eab308" font-family="monospace" font-size="12">MEDIUM     CVE-2024-ZZZZ   XSS in Search Parameter</text>
  <text x="40" y="570" fill="#888" font-family="monospace" font-size="11">Endpoint: /search?q=</text>
  <text x="40" y="585" fill="#888" font-family="monospace" font-size="11">Remediation: Output encoding, Content-Security-Policy</text>
</svg>