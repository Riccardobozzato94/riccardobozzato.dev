<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)" rx="12"/>
  <!-- Terminal header -->
  <rect x="0" y="0" width="800" height="40" fill="url(#header)" rx="12"/>
  <rect x="0" y="24" width="800" height="16" fill="url(#header)"/>
  <!-- Window buttons -->
  <circle cx="20" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="42" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="20" r="6" fill="#27c93f"/>
  <text x="400" y="25" fill="#666" font-family="monospace" font-size="12" text-anchor="middle">vulnclaw — help</text>
  <!-- Terminal content -->
  <text x="20" y="70" fill="#16a34a" font-family="monospace" font-size="13">$ vulnclaw --help</text>
  <text x="20" y="95" fill="#888" font-family="monospace" font-size="12">VulnClaw v0.4.0 — AI-Driven Penetration Testing CLI</text>
  <text x="20" y="115" fill="#888" font-family="monospace" font-size="12">Usage: vulnclaw [OPTIONS] COMMAND [ARGS]...</text>
  <text x="20" y="145" fill="#fff" font-family="monospace" font-size="12" font-weight="bold">Commands:</text>
  <text x="20" y="170" fill="#16a34a" font-family="monospace" font-size="12">  recon</text>
  <text x="120" y="170" fill="#888" font-family="monospace" font-size="12">Reconnaissance: subdomains, ports, services</text>
  <text x="20" y="195" fill="#16a34a" font-family="monospace" font-size="12">  scan</text>
  <text x="120" y="195" fill="#888" font-family="monospace" font-size="12">Vulnerability scanning and detection</text>
  <text x="20" y="220" fill="#16a34a" font-family="monospace" font-size="12">  exploit</text>
  <text x="120" y="220" fill="#888" font-family="monospace" font-size="12">Automated exploitation with LLM guidance</text>
  <text x="20" y="245" fill="#16a34a" font-family="monospace" font-size="12">  report</text>
  <text x="120" y="245" fill="#888" font-family="monospace" font-size="12">Generate penetration test reports</text>
  <text x="20" y="270" fill="#16a34a" font-family="monospace" font-size="12">  agent</text>
  <text x="120" y="270" fill="#888" font-family="monospace" font-size="12">Interactive AI agent mode</text>
  <text x="20" y="300" fill="#fff" font-family="monospace" font-size="12" font-weight="bold">Options:</text>
  <text x="20" y="325" fill="#888" font-family="monospace" font-size="12">  -t, --target TEXT        Target URL or IP address</text>
  <text x="20" y="345" fill="#888" font-family="monospace" font-size="12">  -m, --model TEXT         LLM model for agent mode</text>
  <text x="20" y="365" fill="#888" font-family="monospace" font-size="12">  -o, --output FILE        Output results to file</text>
  <text x="20" y="385" fill="#888" font-family="monospace" font-size="12">  -v, --verbose            Increase verbosity</text>
  <text x="20" y="405" fill="#888" font-family="monospace" font-size="12">  --help                   Show this message and exit</text>
  <text x="20" y="440" fill="#16a34a" font-family="monospace" font-size="13">$ vulnclaw recon --target example.com</text>
  <text x="20" y="465" fill="#888" font-family="monospace" font-size="12">[2026-07-15 14:32:01] Starting reconnaissance on example.com...</text>
  <text x="20" y="485" fill="#888" font-family="monospace" font-size="12">[2026-07-15 14:32:03] Resolving DNS records...</text>
  <text x="20" y="505" fill="#eab308" font-family="monospace" font-size="12">[2026-07-15 14:32:05] Found 12 subdomains</text>
  <text x="20" y="525" fill="#888" font-family="monospace" font-size="12">[2026-07-15 14:32:08] Scanning open ports...</text>
  <text x="20" y="545" fill="#eab308" font-family="monospace" font-size="12">[2026-07-15 14:32:15] 5 open ports detected</text>
  <text x="20" y="570" fill="#16a34a" font-family="monospace" font-size="12">[2026-07-15 14:32:16] Recon complete. Use scan for vulnerability analysis.</text>
  <circle cx="20" cy="580" r="3" fill="#16a34a" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1s" repeatCount="indefinite"/>
  </circle>
</svg>