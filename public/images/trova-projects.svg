<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="600" cy="250" rx="350" ry="250" fill="url(#glow)"/>

  <!-- Navbar -->
  <rect x="0" y="0" width="1200" height="64" fill="#0a0a0a" opacity="0.9"/>
  <rect x="0" y="64" width="1200" height="1" fill="#222"/>

  <polygon points="40,32 50,26 60,32 60,44 50,50 40,44" fill="none" stroke="#16a34a" stroke-width="1.5"/>
  <circle cx="50" cy="38" r="2" fill="#16a34a"/>
  <text x="72" y="44" fill="#fff" font-family="system-ui" font-size="18" font-weight="600">riccardobozzato.dev</text>

  <!-- Page title -->
  <text x="600" y="140" fill="#16a34a" font-family="system-ui" font-size="13" text-anchor="middle" opacity="0.8">Portfolio</text>
  <text x="600" y="180" fill="#fff" font-family="system-ui" font-size="36" font-weight="700" text-anchor="middle">Projects</text>
  <text x="600" y="210" fill="#666" font-family="system-ui" font-size="15" text-anchor="middle">Things I have built and shipped</text>

  <!-- Featured card - Trova -->
  <rect x="100" y="250" width="1000" height="220" rx="16" fill="#111" stroke="#16a34a" stroke-opacity="0.3"/>
  <rect x="100" y="250" width="1000" height="220" rx="16" fill="url(#accent)" opacity="0.03"/>

  <!-- Featured badge -->
  <rect x="125" y="270" width="75" height="24" rx="12" fill="#16a34a" opacity="0.15"/>
  <text x="162" y="287" fill="#16a34a" font-family="system-ui" font-size="11" font-weight="600" text-anchor="middle">Featured</text>

  <text x="125" y="320" fill="#fff" font-family="system-ui" font-size="22" font-weight="700">Trova</text>
  <text x="125" y="345" fill="#888" font-family="system-ui" font-size="14">Next.js 16 SaaS Boilerplate</text>
  <text x="125" y="375" fill="#666" font-family="system-ui" font-size="13">Production-ready foundation with auth, database, email,</text>
  <text x="125" y="395" fill="#666" font-family="system-ui" font-size="13">billing, i18n, and shadcn/ui. Launch in days, not weeks.</text>

  <!-- Tags -->
  <rect x="125" y="415" width="80" height="24" rx="6" fill="#1a1a1a" stroke="#333"/>
  <text x="165" y="432" fill="#888" font-family="system-ui" font-size="11" text-anchor="middle">Next.js 16</text>
  <rect x="213" y="415" width="55" height="24" rx="6" fill="#1a1a1a" stroke="#333"/>
  <text x="240" y="432" fill="#888" font-family="system-ui" font-size="11" text-anchor="middle">SaaS</text>
  <rect x="276" y="415" width="70" height="24" rx="6" fill="#1a1a1a" stroke="#333"/>
  <text x="311" y="432" fill="#888" font-family="system-ui" font-size="11" text-anchor="middle">€49</text>

  <!-- Thumbnail placeholder -->
  <rect x="720" y="275" width="350" height="175" rx="10" fill="#1a1a1a" stroke="#222"/>
  <rect x="720" y="275" width="350" height="175" rx="10" fill="url(#accent)" opacity="0.08"/>
  <text x="895" y="370" fill="#444" font-family="system-ui" font-size="40">◆</text>

  <!-- Card 2 - VulnClaw -->
  <rect x="100" y="500" width="480" height="200" rx="14" fill="#111" stroke="#222"/>
  <rect x="100" y="500" width="480" height="200" rx="14" fill="#3b82f6" opacity="0.03"/>

  <rect x="125" y="520" width="60" height="22" rx="11" fill="#3b82f6" opacity="0.15"/>
  <text x="155" y="535" fill="#60a5fa" font-family="system-ui" font-size="10" font-weight="600" text-anchor="middle">CLI</text>

  <text x="125" y="565" fill="#fff" font-family="system-ui" font-size="20" font-weight="700">VulnClaw</text>
  <text x="125" y="590" fill="#888" font-family="system-ui" font-size="13">AI-driven Pentesting CLI</text>
  <text x="125" y="620" fill="#666" font-family="system-ui" font-size="12">Automated recon, scanning, and</text>
  <text x="125" y="638" fill="#666" font-family="system-ui" font-size="12">exploitation with LLM orchestration.</text>

  <rect x="125" y="660" width="60" height="22" rx="6" fill="#1a1a1a" stroke="#333"/>
  <text x="155" y="675" fill="#888" font-family="system-ui" font-size="10" text-anchor="middle">Python</text>
  <rect x="193" y="660" width="70" height="22" rx="6" fill="#1a1a1a" stroke="#333"/>
  <text x="228" y="675" fill="#888" font-family="system-ui" font-size="10" text-anchor="middle">Security</text>

  <!-- Thumbnail -->
  <rect x="420" y="520" width="140" height="160" rx="8" fill="#1a1a1a" stroke="#222"/>
  <text x="490" y="605" fill="#444" font-family="system-ui" font-size="30">&gt;_</text>

  <!-- Card 3 - Panificio -->
  <rect x="620" y="500" width="480" height="200" rx="14" fill="#111" stroke="#222"/>
  <rect x="620" y="500" width="480" height="200" rx="14" fill="#f59e0b" opacity="0.03"/>

  <rect x="645" y="520" width="80" height="22" rx="11" fill="#f59e0b" opacity="0.15"/>
  <text x="685" y="535" fill="#fbbf24" font-family="system-ui" font-size="10" font-weight="600" text-anchor="middle">Family Gift</text>

  <text x="645" y="565" fill="#fff" font-family="system-ui" font-size="20" font-weight="700">Panificio Da Sergio</text>
  <text x="645" y="590" fill="#888" font-family="system-ui" font-size="13">Bakery E-Commerce</text>
  <text x="645" y="620" fill="#666" font-family="system-ui" font-size="12">Online store for a family bakery</text>
  <text x="645" y="638" fill="#666" font-family="system-ui" font-size="12">with product catalog and ordering.</text>

  <rect x="645" y="660" width="55" height="22" rx="6" fill="#1a1a1a" stroke="#333"/>
  <text x="672" y="675" fill="#888" font-family="system-ui" font-size="10" text-anchor="middle">Next.js</text>
  <rect x="708" y="660" width="80" height="22" rx="6" fill="#1a1a1a" stroke="#333"/>
  <text x="748" y="675" fill="#888" font-family="system-ui" font-size="10" text-anchor="middle">E-Commerce</text>

  <!-- Thumbnail -->
  <rect x="940" y="520" width="140" height="160" rx="8" fill="#1a1a1a" stroke="#222"/>
  <text x="1010" y="605" fill="#444" font-family="system-ui" font-size="30">🍞</text>
</svg>