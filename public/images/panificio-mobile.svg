<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#292524"/>
      <stop offset="100%" stop-color="#1c1917"/>
    </linearGradient>
  </defs>
  <!-- Phone frame -->
  <rect x="10" y="10" width="380" height="780" rx="40" fill="#0c0a09"/>
  <rect x="20" y="20" width="360" height="760" rx="30" fill="url(#bg)"/>
  <!-- Notch -->
  <rect x="140" y="30" width="120" height="8" rx="4" fill="#0c0a09"/>
  <!-- Status bar -->
  <text x="35" y="52" fill="#a8a29e" font-family="system-ui" font-size="11">14:32</text>
  <text x="355" y="52" fill="#a8a29e" font-family="system-ui" font-size="11" text-anchor="end">90%</text>
  <!-- Warm ambient glow -->
  <ellipse cx="200" cy="200" rx="250" ry="200" fill="url(#glow)"/>
  <!-- Hamburger menu -->
  <rect x="35" y="75" width="20" height="2" rx="1" fill="#a8a29e"/>
  <rect x="35" y="82" width="20" height="2" rx="1" fill="#a8a29e"/>
  <rect x="35" y="89" width="20" height="2" rx="1" fill="#a8a29e"/>
  <!-- Logo -->
  <text x="55" y="100" fill="#fbbf24" font-family="system-ui" font-size="13" font-weight="700">Panificio Da Sergio</text>
  <!-- Hero -->
  <text x="200" y="160" fill="#fbbf24" font-family="system-ui" font-size="10" text-anchor="middle" letter-spacing="2">DA QUATTRO GENERAZIONI</text>
  <text x="200" y="200" fill="#fff" font-family="system-ui" font-size="28" font-weight="700" text-anchor="middle">Il Forno</text>
  <text x="200" y="230" fill="#fff" font-family="system-ui" font-size="28" font-weight="700" text-anchor="middle">di Famiglia</text>
  <text x="200" y="265" fill="#d6d3d1" font-family="system-ui" font-size="11" text-anchor="middle">Pane artigianale, dolci</text>
  <text x="200" y="282" fill="#d6d3d1" font-family="system-ui" font-size="11" text-anchor="middle">tradizionali e specialit&agrave;</text>
  <text x="200" y="299" fill="#d6d3d1" font-family="system-ui" font-size="11" text-anchor="middle">locali dal 1958</text>
  <!-- CTA -->
  <rect x="120" y="330" width="160" height="40" rx="10" fill="url(#warm)"/>
  <text x="200" y="355" fill="#fff" font-family="system-ui" font-size="13" font-weight="600" text-anchor="middle">Scopri i Prodotti</text>
  <!-- Section title -->
  <text x="200" y="415" fill="#fff" font-family="system-ui" font-size="18" font-weight="700" text-anchor="middle">I Nostri Prodotti</text>
  <!-- Product card 1 -->
  <rect x="35" y="440" width="330" height="85" rx="10" fill="url(#cardBg)" stroke="#444" stroke-opacity="0.3"/>
  <text x="55" y="470" fill="#fbbf24" font-family="system-ui" font-size="22">&#127838;</text>
  <text x="90" y="475" fill="#fff" font-family="system-ui" font-size="15" font-weight="600">Pane Artigianale</text>
  <text x="90" y="497" fill="#a8a29e" font-family="system-ui" font-size="10">Focaccia, ciabatta, integrale e segale</text>
  <text x="55" y="515" fill="#fbbf24" font-family="system-ui" font-size="12" font-weight="600">Da &euro;2,50</text>
  <!-- Product card 2 -->
  <rect x="35" y="535" width="330" height="85" rx="10" fill="url(#cardBg)" stroke="#444" stroke-opacity="0.3"/>
  <text x="55" y="565" fill="#fbbf24" font-family="system-ui" font-size="22">&#127856;</text>
  <text x="90" y="570" fill="#fff" font-family="system-ui" font-size="15" font-weight="600">Dolci Tradizionali</text>
  <text x="90" y="592" fill="#a8a29e" font-family="system-ui" font-size="10">Crostate, biscotti, ciambelle e torte</text>
  <text x="55" y="610" fill="#fbbf24" font-family="system-ui" font-size="12" font-weight="600">Da &euro;3,00</text>
  <!-- Product card 3 -->
  <rect x="35" y="630" width="330" height="85" rx="10" fill="url(#cardBg)" stroke="#444" stroke-opacity="0.3"/>
  <text x="55" y="660" fill="#fbbf24" font-family="system-ui" font-size="22">&#127844;</text>
  <text x="90" y="665" fill="#fff" font-family="system-ui" font-size="15" font-weight="600">Specialit&agrave; Locali</text>
  <text x="90" y="687" fill="#a8a29e" font-family="system-ui" font-size="10">Piadina, gnocco fritto e salumi</text>
  <text x="55" y="705" fill="#fbbf24" font-family="system-ui" font-size="12" font-weight="600">Da &euro;4,00</text>
  <!-- Bottom nav -->
  <rect x="35" y="740" width="330" height="30" rx="6" fill="#292524"/>
  <text x="90" y="760" fill="#fbbf24" font-family="system-ui" font-size="10" font-weight="600">Home</text>
  <text x="170" y="760" fill="#a8a29e" font-family="system-ui" font-size="10">Prodotti</text>
  <text x="255" y="760" fill="#a8a29e" font-family="system-ui" font-size="10">Carrello</text>
  <text x="330" y="760" fill="#a8a29e" font-family="system-ui" font-size="10">Account</text>
</svg>