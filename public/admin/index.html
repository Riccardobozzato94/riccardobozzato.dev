<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ric2brain CMS</title>
  <style>
    body { background: #0f0f13; color: #fff; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .loader { text-align: center; }
    .loader svg { width: 48px; height: 48px; stroke: #4edea3; }
    .loader p { margin-top: 1rem; color: #a1a1aa; font-size: 0.875rem; }
  </style>
</head>
<body>
  <div class="loader">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12a9 9 0 1 1-6.219-8.56" />
    </svg>
    <p>Caricamento CMS…</p>
  </div>
  <script>
    window.CMS_MANUAL_INIT = true;
  </script>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: { name: "git-gateway", branch: "main" },
        media_folder: "public/uploads",
        public_folder: "/uploads",
        collections: [
          {
            name: "blog_en",
            label: "Blog (English)",
            folder: "content/blog/en",
            create: true,
            slug: "{{slug}}",
            identifier_field: "title",
            format: "frontmatter",
            extension: "md",
            editor: { preview: true },
            fields: [
              { label: "Title", name: "title", widget: "string" },
              { label: "Publish Date", name: "date", widget: "datetime" },
              { label: "Locale", name: "locale", widget: "hidden", default: "en" },
              { label: "Description", name: "description", widget: "text" },
              { label: "Tags", name: "tags", widget: "list", default: ["operations"] },
              { label: "Author", name: "author", widget: "hidden", default: "Riccardo Bozzato" },
              { label: "Image", name: "image", widget: "image", required: false },
              { label: "Body", name: "body", widget: "markdown" },
              { label: "Published", name: "published", widget: "boolean", default: true }
            ]
          },
          {
            name: "blog_it",
            label: "Blog (Italiano)",
            folder: "content/blog/it",
            create: true,
            slug: "{{slug}}",
            identifier_field: "title",
            format: "frontmatter",
            extension: "md",
            editor: { preview: true },
            fields: [
              { label: "Titolo", name: "title", widget: "string" },
              { label: "Data", name: "date", widget: "datetime" },
              { label: "Locale", name: "locale", widget: "hidden", default: "it" },
              { label: "Descrizione", name: "description", widget: "text" },
              { label: "Tags", name: "tags", widget: "list", default: ["operations"] },
              { label: "Autore", name: "author", widget: "hidden", default: "Riccardo Bozzato" },
              { label: "Immagine", name: "image", widget: "image", required: false },
              { label: "Contenuto", name: "body", widget: "markdown" },
              { label: "Pubblicato", name: "published", widget: "boolean", default: true }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
